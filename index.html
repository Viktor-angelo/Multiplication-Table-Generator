<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="nav-links">
        <ul>
            <button id="theme-btn">change theme</button>
        </ul>
    </nav>

    <h1>Enter a number and generate the multiplication table</h1>

    <div id="calculator-box">
        <h4>Number:</h4>
        <input type="number" id="number-input"/>

        <h4>Up to how much to calculate</h4>
        <input type="number" id="limit-input"/>

        <button id="calculate-btn">Calculate</button>
    </div>

    <h2 id="result-title">Result</h2>

    <div id="result-box">
        <h3 id="result">Enter a number to generate a multiplication table</h3>
    </div>

    <footer>Created by: Viktor Angelo</footer>
</body>
</html>
